# Generated by dotenc tools install-github-diffs.
# This pull_request_target job has repository secrets. Never add checkout,
# install, build, cache, or run steps that consume pull-request-controlled code.
name: Redacted dotenc diff

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dotenc-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dotenc-diff:
    name: Redacted dotenc environment diff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compare encrypted environments
        uses: dotenc/dotenc/actions/diff@ff6cf97a0323bc70ee10207e6555ba4d2e3b0be2
        with:
          github-token: ${{ github.token }}
          fail-on-error: "true"
        env:
          DOTENC_PRIVATE_KEY_BASE64: ${{ secrets.DOTENC_DIFF_PRIVATE_KEY_BASE64 }}
