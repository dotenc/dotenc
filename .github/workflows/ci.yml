name: CI

on:
  pull_request:
    branches:
      - main
      - beta

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Validate GitHub Action scripts
        run: bash -n actions/_lib/*.sh scripts/sync-action-wrappers.sh

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install

      - name: Run coverage tests
        run: bun run test:coverage

      - name: Upload CLI coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cli/coverage/lcov.info
          flags: cli
          name: cli-unit-tests

      - name: Upload VS Code extension coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./vscode-extension/coverage/lcov.info
          flags: vscode-extension
          name: vscode-extension-unit-tests

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build e2e Docker image
        run: docker build -t dotenc-e2e -f cli/e2e/Dockerfile .

      - name: Run e2e tests
        run: docker run --rm dotenc-e2e

  cli-image:
    name: CLI image (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            target: runtime
            image: dotenc-cli:debian
          - variant: alpine
            target: runtime-alpine
            image: dotenc-cli:alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build CLI image (${{ matrix.variant }})
        run: docker build --target "${{ matrix.target }}" -t "${{ matrix.image }}" -f cli/Dockerfile .

      - name: Verify CLI image (${{ matrix.variant }})
        run: |
          docker run --rm "${{ matrix.image }}" --version
          docker run --rm --entrypoint sh "${{ matrix.image }}" -c '
            set -eu
            test "$(id -u)" = "10001"
            test "$(id -g)" = "10001"
            command -v dotenc
            command -v ssh-keygen
            mkdir -p "$HOME/.ssh"
            ssh-keygen -q -t ed25519 -N "" -f "$HOME/.ssh/id_ed25519"
            dotenc init -n image-smoke -k id_ed25519 >/tmp/init.log
            dotenc env create production image-smoke >/tmp/create.log
            printf "IMAGE_SMOKE_OK=yes\n" | dotenc env encrypt --stdin production >/tmp/encrypt.log
            test "$(dotenc env decrypt production)" = "IMAGE_SMOKE_OK=yes"
          '
