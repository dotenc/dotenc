name: Release binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.version-check.outputs.bumped }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Check if version has been bumped
        id: version-check
        run: |
          VERSION="$(node -p "require('./cli/package.json').version")"
          NPM_VERSION="$(npm view @dotenc/cli version 2>/dev/null || echo "0.0.0")"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" = "$NPM_VERSION" ]; then
            echo "Version has not been bumped."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version has been bumped to $VERSION."
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: github.event_name == 'push' && needs.check-version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    outputs:
      linux_package_input_artifact_id: ${{ steps.linux-package-inputs.outputs.artifact-id }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: cd cli && bun run build:binary

      - name: Package archives
        run: |
          cd cli/dist
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64 linux-x64-musl linux-arm64-musl; do
            tar -czf "dotenc-${target}.tar.gz" "dotenc-${target}"
          done
          zip "dotenc-windows-x64.zip" "dotenc-windows-x64.exe"
          sha256sum \
            dotenc-darwin-arm64.tar.gz \
            dotenc-darwin-x64.tar.gz \
            dotenc-linux-x64.tar.gz \
            dotenc-linux-arm64.tar.gz \
            dotenc-linux-x64-musl.tar.gz \
            dotenc-linux-arm64-musl.tar.gz \
            dotenc-windows-x64.zip \
            > SHA256SUMS

      - name: Seal Linux package inputs for this workflow run
        id: linux-package-inputs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: linux-package-inputs-v${{ needs.check-version.outputs.version }}-attempt-${{ github.run_attempt }}
          path: |
            cli/dist/dotenc-linux-x64.tar.gz
            cli/dist/dotenc-linux-arm64.tar.gz
            cli/dist/dotenc-linux-x64-musl.tar.gz
            cli/dist/dotenc-linux-arm64-musl.tar.gz
            cli/dist/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            cli/dist/dotenc-darwin-arm64.tar.gz
            cli/dist/dotenc-darwin-x64.tar.gz
            cli/dist/dotenc-linux-x64.tar.gz
            cli/dist/dotenc-linux-arm64.tar.gz
            cli/dist/dotenc-linux-x64-musl.tar.gz
            cli/dist/dotenc-linux-arm64-musl.tar.gz
            cli/dist/dotenc-windows-x64.zip
            cli/dist/SHA256SUMS

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          SHA_DARWIN_ARM64=$(sha256sum cli/dist/dotenc-darwin-arm64.tar.gz | awk '{print $1}')
          SHA_DARWIN_X64=$(sha256sum cli/dist/dotenc-darwin-x64.tar.gz | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum cli/dist/dotenc-linux-x64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum cli/dist/dotenc-linux-arm64.tar.gz | awk '{print $1}')

          FORMULA=$(cat <<RUBY
          class Dotenc < Formula
            desc "Git-native encrypted environments powered by your SSH keys"
            homepage "https://github.com/dotenc/dotenc"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/dotenc/dotenc/releases/download/v${VERSION}/dotenc-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/dotenc/dotenc/releases/download/v${VERSION}/dotenc-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/dotenc/dotenc/releases/download/v${VERSION}/dotenc-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/dotenc/dotenc/releases/download/v${VERSION}/dotenc-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "dotenc-darwin-arm64" => "dotenc"
              elsif OS.mac? && Hardware::CPU.intel?
                bin.install "dotenc-darwin-x64" => "dotenc"
              elsif OS.linux? && Hardware::CPU.arm?
                bin.install "dotenc-linux-arm64" => "dotenc"
              else
                bin.install "dotenc-linux-x64" => "dotenc"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/dotenc --version")
            end
          end
          RUBY
          )

          # Push formula to homebrew-dotenc tap repo via GitHub API
          ENCODED=$(echo -n "$FORMULA" | base64 -w 0)

          # Check if formula already exists
          EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            "https://api.github.com/repos/ivanfilhoz/homebrew-dotenc/contents/Formula/dotenc.rb")

          if [ "$EXISTING" = "200" ]; then
            SHA=$(curl -s \
              -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
              "https://api.github.com/repos/ivanfilhoz/homebrew-dotenc/contents/Formula/dotenc.rb" \
              | jq -r '.sha')

            curl -s -X PUT \
              -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/ivanfilhoz/homebrew-dotenc/contents/Formula/dotenc.rb" \
              -d "{\"message\":\"Update dotenc to v${VERSION}\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}"
          else
            curl -s -X PUT \
              -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/ivanfilhoz/homebrew-dotenc/contents/Formula/dotenc.rb" \
              -d "{\"message\":\"Add dotenc v${VERSION}\",\"content\":\"${ENCODED}\"}"
          fi

      - name: Update Scoop bucket
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          SHA_WINDOWS_X64=$(sha256sum cli/dist/dotenc-windows-x64.zip | awk '{print $1}')

          MANIFEST=$(cat <<JSON
          {
            "version": "${VERSION}",
            "description": "Git-native encrypted environments powered by your SSH keys",
            "homepage": "https://github.com/dotenc/dotenc",
            "license": "MIT",
            "url": "https://github.com/dotenc/dotenc/releases/download/v${VERSION}/dotenc-windows-x64.zip",
            "hash": "sha256:${SHA_WINDOWS_X64}",
            "bin": [["dotenc-windows-x64.exe", "dotenc"]],
            "checkver": {
              "github": "https://github.com/dotenc/dotenc"
            },
            "autoupdate": {
              "url": "https://github.com/dotenc/dotenc/releases/download/v\$version/dotenc-windows-x64.zip"
            }
          }
          JSON
          )

          # Push manifest to scoop-dotenc bucket repo via GitHub API
          ENCODED=$(echo -n "$MANIFEST" | base64 -w 0)

          # Check if manifest already exists
          EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $SCOOP_BUCKET_TOKEN" \
            "https://api.github.com/repos/ivanfilhoz/scoop-dotenc/contents/bucket/dotenc.json")

          if [ "$EXISTING" = "200" ]; then
            SHA=$(curl -s \
              -H "Authorization: token $SCOOP_BUCKET_TOKEN" \
              "https://api.github.com/repos/ivanfilhoz/scoop-dotenc/contents/bucket/dotenc.json" \
              | jq -r '.sha')

            curl -s -X PUT \
              -H "Authorization: token $SCOOP_BUCKET_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/ivanfilhoz/scoop-dotenc/contents/bucket/dotenc.json" \
              -d "{\"message\":\"Update dotenc to v${VERSION}\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}"
          else
            curl -s -X PUT \
              -H "Authorization: token $SCOOP_BUCKET_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/ivanfilhoz/scoop-dotenc/contents/bucket/dotenc.json" \
              -d "{\"message\":\"Add dotenc v${VERSION}\",\"content\":\"${ENCODED}\"}"
          fi

  publish-cli-image:
    name: Publish CLI image (${{ matrix.variant }})
    needs: [check-version, build-and-release]
    if: >-
      always() &&
      needs.check-version.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.check-version.outputs.bumped == 'true' &&
          needs.build-and-release.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            target: runtime
            suffix: ""
            rolling: latest
          - variant: alpine
            target: runtime-alpine
            suffix: -alpine
            rolling: alpine
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dotenc/cli
          tags: |
            type=raw,value=${{ needs.check-version.outputs.version }}${{ matrix.suffix }},priority=300
            type=raw,value=v${{ needs.check-version.outputs.version }}${{ matrix.suffix }},priority=250
            type=raw,value=${{ matrix.rolling }},priority=200
          labels: |
            org.opencontainers.image.version=${{ needs.check-version.outputs.version }}
            org.dotenc.image.variant=${{ matrix.variant }}

      - name: Build and publish CLI image (${{ matrix.variant }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cli/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOTENC_VERSION=${{ needs.check-version.outputs.version }}
            VCS_REF=${{ github.sha }}
          provenance: true
          sbom: true

  publish-linux-packages:
    name: Publish Linux packages
    needs: [check-version, build-and-release]
    if: >-
      github.event_name == 'push' &&
      vars.LINUX_PACKAGES_ENABLED == 'true' &&
      needs.check-version.outputs.bumped == 'true' &&
      needs.build-and-release.result == 'success'
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/publish-linux-packages.yml
    with:
      version: ${{ needs.check-version.outputs.version }}
      package_input_artifact_id: ${{ needs.build-and-release.outputs.linux_package_input_artifact_id }}

  publish-aur-package:
    name: Publish AUR package
    needs: [check-version, build-and-release]
    if: >-
      github.event_name == 'push' &&
      vars.AUR_PACKAGES_ENABLED == 'true' &&
      needs.check-version.outputs.bumped == 'true' &&
      needs.build-and-release.result == 'success'
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/publish-aur-package.yml
    with:
      version: ${{ needs.check-version.outputs.version }}
