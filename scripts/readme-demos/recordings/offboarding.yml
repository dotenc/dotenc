# The configurations that used for the recording, feel free to edit them
config:

  # Terminalizer is an authoring-only dependency. Keep this configuration fixed so
  # regenerated README assets have stable dimensions, colors, and timing.
  command: bun scene.ts
  cwd: .
  env:
    recording: true
  cols: 76
  rows: 12
  repeat: 0
  quality: 88
  frameDelay: auto
  maxIdleTime: 3000
  frameBox:
    type: solid
    title: dotenc
    style:
      backgroundColor: "#0d1117"
      border: "1px #30363d solid"
      boxShadow: none
      margin: "0px"
  watermark:
    imagePath: null
    style: {}
  cursorStyle: bar
  fontFamily: "SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace"
  fontSize: 15
  lineHeight: 1.3
  letterSpacing: 0
  theme:
    background: "#0d1117"
    foreground: "#c9d1d9"
    cursor: "#58a6ff"
    black: "#484f58"
    red: "#ff7b72"
    green: "#3fb950"
    yellow: "#d29922"
    blue: "#58a6ff"
    magenta: "#bc8cff"
    cyan: "#39c5cf"
    white: "#b1bac4"
    brightBlack: "#6e7681"
    brightRed: "#ffa198"
    brightGreen: "#56d364"
    brightYellow: "#e3b341"
    brightBlue: "#79c0ff"
    brightMagenta: "#d2a8ff"
    brightCyan: "#56d4dd"
    brightWhite: "#f0f6fc"

