name: Redacted dotenc diff
description: Post a safe semantic diff of encrypted dotenc environments on a pull request.
author: dotenc
inputs:
  github-token:
    description: The workflow's GITHUB_TOKEN, used to read Git objects and manage the pull request comment.
    required: true
    default: ${{ github.token }}
  comment:
    description: Create, update, or remove the dotenc pull request comment as needed.
    required: false
    default: "true"
  fail-on-error:
    description: Fail for unavailable report sections or generation/publication errors when true; stale-comment cleanup failures always fail.
    required: false
    default: "false"
outputs:
  report:
    description: Compact versioned redacted JSON; empty when the action fails before producing a report.
  has-changes:
    description: Whether the report contains changed or unverified environments; false means a verified empty report.
  comment-url:
    description: URL of the non-empty pull request comment published by this run; empty when this run published none.
runs:
  using: node24
  main: dist/index.js
branding:
  icon: shield
  color: blue
