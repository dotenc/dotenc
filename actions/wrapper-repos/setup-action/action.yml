name: Setup dotenc
description: Install the dotenc CLI for later GitHub Actions steps.
inputs:
  version:
    description: Version of @dotenc/cli to install.
    required: false
    default: latest
  check:
    description: Run dotenc --version after installation.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: dotenc/dotenc/actions/setup@v1
      with:
        version: ${{ inputs.version }}
        check: ${{ inputs.check }}
